  # GitHub Actions: 1x weekly. No release triggered (chore).
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      github-actions-updates:
        patterns: ['*']
