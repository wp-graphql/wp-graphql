  # WPGraphQL.com NPM dependencies. No release triggered (chore).
  - package-ecosystem: 'npm'
    directory: '/websites/wpgraphql.com'
    schedule:
      interval: 'weekly'
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    groups:
