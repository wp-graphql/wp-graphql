version: 2

updates:
  # wp-graphql plugin.
  - package-ecosystem: 'composer'
    directory: '/plugins/wp-graphql'
    schedule:
      interval: 'weekly'
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    commit-message:
      prefix: 'fix'
      prefix-development: 'fix'
      include: 'scope'
    groups:
      # We don't bundle minor or major production assets, so they're tested individually.
      wp-graphql-composer-dev-minor-patch:
        dependency-type: 'development'
        update-types: [minor, patch]
      wp-graphql-composer-patch:
        dependency-type: 'production'
        update-types: [patch]
  - package-ecosystem: 'npm'
    directory: '/plugins/wp-graphql'
    schedule:
      interval: 'weekly'
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    commit-message:
      prefix: 'feat'
      prefix-development: 'fix'
      include: 'scope'
    groups:
      wp-graphql-npm-minor-patch:
        update-types: [minor, patch]

  # wp-graphql-acf plugin.
