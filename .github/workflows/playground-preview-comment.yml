name: Playground Preview Comment

# Posts (or updates) the sticky PR comment with a WordPress Playground
# link to the IDE plugin built by `playground-preview.yml`.
#
# Split off into its own workflow because `pull_request` from forks
# silently downgrades `GITHUB_TOKEN`'s `pull-requests: write` to read,
# which is why the comment step was failing for every fork PR. The
# `workflow_run` trigger runs in the BASE repo context with the base
# repo's token, so commenting works for fork PRs too.
#
# Caveat: like every `workflow_run`-triggered workflow, GitHub always
# executes the copy of this file on the default branch — changes here
# don't take effect on the PR that introduces them. They'll start
# working for fork PRs once merged.

on:
  workflow_run:
    workflows: ['Playground Preview']
    types: [completed]

permissions:
  pull-requests: write
  actions: read   # required by actions/download-artifact to read from another run

jobs:
  comment:
    # Skip on non-PR runs (manual reruns, schedules, etc) and on failed builds —
    # no point pointing reviewers at a Playground link backed by a missing artifact.
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR metadata
        id: meta
        run: |
          set -euo pipefail
          # The metadata file is two KEY=VALUE lines from the sibling
          # workflow; source it into the env-file format GitHub Actions
          # outputs use. Validating both keys are present catches a
          # mismatch with the producer side instead of silently posting
          # a comment on PR #0.
          # shellcheck disable=SC1091
          source pr-meta.env
          : "${PR_NUMBER:?PR_NUMBER missing from pr-meta artifact}"
          : "${HEAD_SHA:?HEAD_SHA missing from pr-meta artifact}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      # Build the Playground URL with a base64-encoded blueprint inline
      # in the URL fragment. nightly.link proxies the workflow artifact
      # (uploaded by playground-preview.yml under the same run_id) to a
      # public URL Playground can fetch — no extra hosting infra.
      - id: url
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          BLUEPRINT=$(cat <<JSON
          {
            "preferredVersions": { "php": "8.3", "wp": "latest" },
            "features": { "networking": true },
            "login": true,
            "landingPage": "/wp-admin/admin.php?page=graphql-ide",
            "steps": [
              { "step": "installPlugin", "pluginData": { "resource": "url", "url": "https://downloads.wordpress.org/plugin/wp-graphql.latest-stable.zip" }, "options": { "activate": true } },
              { "step": "installPlugin", "pluginData": { "resource": "url", "url": "https://nightly.link/${REPO}/actions/runs/${RUN_ID}/wp-graphql-ide.zip" }, "options": { "activate": true } }
            ]
          }
          JSON
          )
          ENCODED=$(printf '%s' "$BLUEPRINT" | base64 -w0)
          echo "url=https://playground.wordpress.net/#${ENCODED}" >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.meta.outputs.pr_number }}
          header: playground-preview
          message: |
            ## ▶ Preview in WordPress Playground

            **[Open this PR in Playground](${{ steps.url.outputs.url }})** — boots a fresh WordPress, installs WPGraphQL + this PR's IDE build, lands you at the IDE.

            <sub>Built from `${{ steps.meta.outputs.head_sha }}`. Auto-updates when you push.</sub>
