name: Playground Preview

# Builds the IDE plugin from the PR commit and uploads the ZIP as a
# workflow artifact, plus a tiny metadata file with the PR number and
# head SHA. The sticky preview comment is posted by a sibling workflow
# (`playground-preview-comment.yml`) triggered on `workflow_run` so it
# runs in the base repo context — required to comment on PRs from
# forks, where `pull_request`'s `GITHUB_TOKEN` is read-only by design.

on:
  pull_request:
    paths:
      - 'plugins/wp-graphql-ide/**'
      - '.github/workflows/playground-preview.yml'
      - '.github/workflows/playground-preview-comment.yml'

# No pull-requests:write here — fork PRs would silently get it
# downgraded to read anyway, and the actual commenting happens in the
# sibling workflow on workflow_run.
permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run -w @wpgraphql/wp-graphql-ide build

      # `wp-scripts plugin-zip` uses the npm package name as the filename,
      # which for a scoped package (`@wpgraphql/wp-graphql-ide`) lands as
      # `@wpgraphql/wp-graphql-ide.zip` — the `@wpgraphql/` becomes a real
      # subdirectory. Rename to a stable, predictable filename for the
      # nightly.link URL the comment references.
      - name: Normalize ZIP filename
        run: |
          BUILT_ZIP=$(find plugins/wp-graphql-ide -maxdepth 3 -name '*.zip' -not -path '*/node_modules/*' | head -1)
          if [ -z "$BUILT_ZIP" ]; then
            echo "::error::No plugin ZIP found after build"
            exit 1
          fi
          mv "$BUILT_ZIP" plugins/wp-graphql-ide/wp-graphql-ide.zip
          ls -la plugins/wp-graphql-ide/wp-graphql-ide.zip

      - uses: actions/upload-artifact@v4
        with:
          name: wp-graphql-ide
          path: plugins/wp-graphql-ide/wp-graphql-ide.zip
          if-no-files-found: error

      # Stash the PR number + head SHA in a separate artifact so the
      # sibling workflow_run-triggered workflow can build a comment
      # targeted at the right PR without a GitHub API lookup. The
      # workflow_run event exposes `head_sha` but not the PR number,
      # so this is the easiest reliable handoff.
      - name: Save PR metadata
        run: |
          mkdir -p pr-meta
          {
            echo "PR_NUMBER=${{ github.event.pull_request.number }}"
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}"
          } > pr-meta/pr-meta.env

      - uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: pr-meta/pr-meta.env
          if-no-files-found: error
